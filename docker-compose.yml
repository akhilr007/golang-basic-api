services:
  db:
    image: postgres:16-alpine
    container_name: tasks_pg
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: tasks_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_is_ready -U appuser"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
