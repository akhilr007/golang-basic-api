version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: tasks_test_db
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: test_db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d test_db"]
      interval: 2s
      timeout: 2s
      retries: 10
