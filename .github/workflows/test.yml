name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: test_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U testuser"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    env:
      TEST_DB_URL: postgres://testuser:testpass@localhost:5433/test_db?sslmode=disable

    steps:
      # ================================
      # CHECKOUT
      # ================================
      - name: Checkout code
        uses: actions/checkout@v4

      # ================================
      # SETUP GO
      # ================================
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      # ================================
      # CACHE
      # ================================
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      # ================================
      # FORMAT CHECK (gofmt)
      # ================================
      - name: Check formatting
        run: |
          fmt=$(gofmt -l .)
          if [ -n "$fmt" ]; then
            echo "The following files are not formatted:"
            echo "$fmt"
            exit 1
          fi

      # ================================
      # VET
      # ================================
      - name: Run go vet
        run: go vet ./...
        
      # ================================
      # DOWNLOAD DEPENDENCIES (CRITICAL FIX)
      # ================================
      - name: Download dependencies
        run: go mod tidy
        
      # ================================
      # LINT (golangci-lint)
      # ================================
      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
          | sh -s -- -b $(go env GOPATH)/bin v1.56.2

      - name: Run linter
        run: golangci-lint run ./...

      # ================================
      # INSTALL MIGRATE
      # ================================
      - name: Install migrate
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/latest/download/migrate.linux-amd64.tar.gz \
          | tar xvz
          sudo mv migrate /usr/local/bin/

      # ================================
      # WAIT FOR DB
      # ================================
      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5433 -U testuser; do
            sleep 1
          done

      # ================================
      # MIGRATIONS
      # ================================
      - name: Run migrations
        run: DB_URL=${{ env.TEST_DB_URL }} make migrate-up

      # ================================
      # UNIT TESTS + COVERAGE
      # ================================
      - name: Run unit tests with coverage
        run: |
          go test ./... -coverprofile=coverage.out -covermode=atomic

      # ================================
      # INTEGRATION TESTS
      # ================================
      - name: Run integration tests
        run: go test -tags=integration ./... -v

      # ================================
      # SHOW COVERAGE %
      # ================================
      - name: Show coverage
        run: go tool cover -func=coverage.out

      # ================================
      # UPLOAD COVERAGE ARTIFACT
      # ================================
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
